<h1 class="text-center app-text-color">Login</h1>
<form class="mx-auto half-width col-5" method="post" action="/Users/Login">
    <div class="top-border-line primary-separator"></div>
    <div class="form-group">
        <label for="username" class="app-text-color">Username</label>
        <input type="text" class="form-control" id="username" placeholder="Username..." name="username">
    </div>
    <div class="form-group">
        <label for="password" class="app-text-color">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Password..." name="password">
    </div>
    <div class="top-border-line primary-separator"></div>
    <div class="button-holder d-flex justify-content-center">
        <button type="submit" class="btn app-bg-color">Login</button>
    </div>
</form>
