<h1 class="text-center app-text-color">Problem - @Model.Name</h1>
<form class="mx-auto half-width col-5" method="post" action="/Submissions/Create">
    <div class="top-border-line primary-separator"></div>
    <div class="form-group">
        <label for="code" class="app-text-color">Submit your code here:</label>
        <textarea class="form-control" id="code" name="code" rows="10"></textarea>
    </div>
    <input type="hidden" id="ProblemId" name="ProblemId" value="@Model.ProblemId" />
    <div class="top-border-line primary-separator"></div>
    <div class="button-holder d-flex justify-content-center">
        <button type="submit" class="btn app-bg-color">Submit</button>
    </div>
</form>
